name: Feature request
description: Propose an EdgeWatch capability or usability improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the operator need before describing a solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and privacy considerations
  - type: textarea
    id: operations
    attributes:
      label: Installation, upgrade, rollback, or storage impact
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
