name: EdgeWatch CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install runtime and review tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install ruff bandit

      - name: Unit tests
        env:
          PYTHONWARNINGS: error::ResourceWarning
          PYTHONPATH: .
        run: python -m unittest discover -s tests -v

      - name: Python compile
        run: python -m compileall -q edgewatch tests

      - name: Ruff
        run: ruff check edgewatch tests

      - name: Bandit
        run: bandit -q -r edgewatch

      - name: Dependency consistency
        run: python -m pip check

      - name: JavaScript syntax
        run: node --check edgewatch/static/app.js

      - name: Shell syntax
        run: |
          for file in scripts/*.sh; do
            bash -n "$file"
          done

      - name: systemd unit syntax
        run: bash scripts/verify-units.sh
